name: hermes-plugin-searxng
kind: standalone
version: 0.2.1
description: Web search via self-hosted SearXNG (multi-query, parallel, JSON API) plus bundled internet-search skill.
author: simens_green

provides_tools:
  - searxng

provides_hooks: []

requires_env:
  - name: SEARXNG_URL
    description: "SearXNG search path for JSON API, e.g. https://your-instance.tld/search"
    url: "https://docs.searxng.org/"
    secret: false
